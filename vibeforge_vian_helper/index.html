<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#0D9488"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Vian Helper"/>
  <!-- Content Security Policy for Capacitor WebView -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval';"/>
  <title>VibeForge Vian Helper</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="./icon/icon-192.png"/>
  <link rel="apple-touch-icon" href="./icon/icon-192.png"/>
  <link rel="stylesheet" href="./assets/css/theme.css"/>
  <link rel="stylesheet" href="./assets/css/app.css"/>
  <link rel="stylesheet" href="./assets/css/tabs.css"/>
  <link rel="stylesheet" href="./assets/css/editor.css"/>
</head>
<body>
  <div id="top-bar">
    <button id="btn-hamburger" aria-label="Menu">&#9776;</button>
    <div id="tab-title">Notes</div>
    <button id="btn-universal" aria-label="Settings">&#9881;</button>
  </div>

  <div id="menu-strip"></div>

  <div id="content">
    <div id="tab-notes" class="tab active"></div>
    <div id="tab-habits" class="tab"></div>
    <div id="tab-expense" class="tab"></div>
    <div id="tab-calendar" class="tab"></div>
  </div>

  <!-- FAB floats above curved nav -->
  <button id="fab-btn" aria-label="Add">&#10133;</button>
  <div id="fab-picker" class="hidden"><div id="fab-picker-inner"></div></div>
  <button id="journal-fab" class="hidden" aria-label="New journal entry">&#128221;</button>

  <nav id="bottom-nav">
    <svg id="nav-curve" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" preserveAspectRatio="none">
      <path d="M0,30 L125.6,30 Q146,30 146,40.2 A28.9,34 0 0,0 214,40.2 Q214,30 234.4,30 L360,30 L360,90 L0,90 Z" fill="var(--surface)"/>
    </svg>
    <button class="nav-btn active" data-tab="notes" onclick="switchTab('notes')">&#128221;</button>
    <button class="nav-btn" data-tab="habits" onclick="switchTab('habits')">&#9989;</button>
    <div class="nav-fab-space"></div>
    <button class="nav-btn" data-tab="expense" onclick="switchTab('expense')">&#128176;</button>
    <button class="nav-btn" data-tab="calendar" onclick="switchTab('calendar')">&#128197;</button>
  </nav>

  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="sidebar"><div id="sidebar-inner"></div></div>
  <div id="universal-menu" class="hidden"></div>
  <div id="fullscreen" class="hidden"><div id="fullscreen-inner"></div></div>
  <div id="toast"></div>

  <script src="./assets/js/db/db.js"></script>
  <script src="./assets/js/db/notes-db.js"></script>
  <script src="./assets/js/db/habits-db.js"></script>
  <script src="./assets/js/db/expense-db.js"></script>
  <script src="./assets/js/db/calendar-db.js"></script>
  <script src="./assets/js/db/journal-db.js"></script>
  <script src="./assets/js/utils/date.js"></script>
  <script src="./assets/js/utils/theme.js"></script>
  <script src="./assets/js/utils/encrypt.js"></script>
  <script src="./assets/js/utils/fuzzy-parser.js"></script>
  <script src="./assets/js/nav.js"></script>
  <script src="./assets/js/fab.js"></script>
  <script src="./assets/js/hamburger.js"></script>
  <script src="./assets/js/backup/backup.js"></script>
  <script src="./assets/js/search/search.js"></script>
  <script src="./assets/js/tabs/notes-tab.js"></script>
  <script src="./assets/js/tabs/habits-tab.js"></script>
  <script src="./assets/js/tabs/expense-tab.js"></script>
  <script src="./assets/js/tabs/calendar-tab.js"></script>
  <script src="./assets/js/tabs/journal.js"></script>
  <script src="./assets/js/tabs/plans-events.js"></script>
  <script src="./assets/js/universal-settings.js"></script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
